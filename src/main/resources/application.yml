spring:
  application:
    name: desafio-tecnico-bff

server:
  port: ${PORT:3001}
  error:
    include-message: always

backend:
  url: ${BACKEND_URL:http://localhost:8080}

frontend:
  origin: ${FRONTEND_ORIGIN:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Segredo para assinar tokens de usuário (mínimo 32 chars)
jwt:
  secret: ${JWT_SECRET:changeme-jwt-secret-32-chars-minimum}

# Segredo compartilhado com o Backend para o service token (mínimo 32 chars)
service:
  token:
    secret: ${SERVICE_TOKEN_SECRET:changeme-service-secret-32-chars-min}
